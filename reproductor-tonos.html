<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tonos de Calibración</title>
    <style>
        body {
            background-color: #111;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        #freq-display {
            font-size: 10rem;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff00;
        }
        #unit {
            font-size: 3rem;
            color: #888;
            margin-top: -30px;
            margin-bottom: 40px;
        }
        #status {
            font-size: 1.5rem;
            color: #ff3333;
            margin-bottom: 50px;
            height: 30px;
        }
        .controls {
            display: flex;
            gap: 20px;
        }
        button {
            background-color: #222;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 20px 30px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            background-color: #00ff00;
            color: #000;
        }
        #play-btn {
            padding: 20px 50px;
            border-color: #fff;
            color: #fff;
        }
    </style>
</head>
<body>
    
    <div id="freq-display">20</div>
    <div id="unit">Hz</div>
    <div id="status">PAUSADO</div>
    
    <div class="controls">
        <button onclick="prevFreq()"><<</button>
        <button id="play-btn" onclick="togglePlay()">PLAY</button>
        <button onclick="nextFreq()">>></button>
    </div>

    <script>
        // Frecuencias centrales normativas de 1/3 de octava
        const freqs = [20, 25, 31.5, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630, 800, 1000, 1250, 1600, 2000, 2500, 3150, 4000, 5000, 6300, 8000, 10000, 12500, 16000, 20000];
        
        let currentIndex = 0;
        let isPlaying = false;
        let audioCtx, oscillator, gainNode;

        // Inicializar el motor de audio (solo la primera vez)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                // Volumen al 50% para no saturar el altavoz Bluetooth
                gainNode.gain.value = 0.5; 
                gainNode.connect(audioCtx.destination);
            }
        }

        // Generar el tono puro
        function startTone() {
            stopTone();
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine'; // Onda senoidal pura
            oscillator.frequency.setValueAtTime(freqs[currentIndex], audioCtx.currentTime);
            oscillator.connect(gainNode);
            oscillator.start();
        }

        // Cortar el tono
        function stopTone() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
        }

        // Actualizar la pantalla
        function updateDisplay() {
            document.getElementById('freq-display').innerText = freqs[currentIndex];
        }

        // Botón Play/Pausa
        function togglePlay() {
            initAudio();
            if (isPlaying) {
                stopTone();
                document.getElementById('status').innerText = "PAUSADO";
                document.getElementById('status').style.color = "#ff3333";
                document.getElementById('play-btn').innerText = "PLAY";
                isPlaying = false;
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                startTone();
                document.getElementById('status').innerText = "REPRODUCIENDO";
                document.getElementById('status').style.color = "#00ff00";
                document.getElementById('play-btn').innerText = "PAUSA";
                isPlaying = true;
            }
        }

        // Botón Siguiente
        function nextFreq() {
            if (currentIndex < freqs.length - 1) {
                currentIndex++;
                updateDisplay();
                if (isPlaying) startTone(); // Si ya está sonando, cambia al nuevo tono sin parar
            }
        }

        // Botón Anterior
        function prevFreq() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
                if (isPlaying) startTone();
            }
        }
    </script>
</body>
</html>
